<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily LLM Quantization Papers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #141416;
            --bg-card: #1c1c1f;
            --bg-card-hover: #232328;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #10b981;
            --accent-hover: #34d399;
            --border: #27272a;
            --tag-bg: #27272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent) 0%, #059669 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.125rem;
            margin-bottom: 24px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-weight: 600;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            padding: 4px;
            background: var(--bg-secondary);
            border-radius: 12px;
            width: fit-content;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .papers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .paper-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .paper-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #059669);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .paper-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .paper-card:hover::before {
            opacity: 1;
        }

        .paper-category {
            display: inline-block;
            padding: 4px 12px;
            background: var(--tag-bg);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .paper-category.llm { background: #10b98120; color: #10b981; }
        .paper-category.edge { background: #3b82f620; color: #3b82f6; }
        .paper-category.uav { background: #f59e0b20; color: #f59e0b; }

        .paper-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .paper-title a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .paper-title a:hover {
            color: var(--accent);
        }

        .paper-authors {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .paper-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .paper-source {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .paper-source-badge {
            padding: 2px 8px;
            background: var(--accent);
            color: #000;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.625rem;
        }

        .paper-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--accent);
            color: #000;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .paper-link:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.75rem;
            }
            
            .papers-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                gap: 12px;
            }
            
            .container {
                padding: 24px 16px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .paper-card {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>

        function createPaperCard(paper, index) {
            const categoryClass = {
                'LLM Quantization': 'llm',
                'Edge Deployment': 'edge',
                'UAV Vision': 'uav'
            };
            
            return `
                <div class="paper-card" style="animation-delay: ${index * 0.05}s">
                    <span class="paper-category ${categoryClass[paper.category] || 'llm'}">${paper.category}</span>
                    <h3 class="paper-title">
                        <a href="${paper.url}" target="_blank" rel="noopener">${paper.title}</a>
                    </h3>
                    <p class="paper-authors">${paper.authors}</p>
                    <div class="paper-meta">
                        <div class="paper-source">
                            <span class="paper-source-badge">${paper.source}</span>
                            <span>${paper.date}</span>
                        </div>
                        <a href="${paper.url}" target="_blank" rel="noopener" class="paper-link">
                            Read Paper →
                        </a>
                    </div>
                </div>
            `;
        }

        function renderPapers(filter = 'all') {
            const grid = document.getElementById('papers-grid');
            const filtered = filter === 'all' 
                ? papersData 
                : papersData.filter(p => p.category === filter);
            
            grid.innerHTML = filtered.map((paper, i) => createPaperCard(paper, i)).join('');
            
            document.getElementById('total-papers').textContent = papersData.length;
            document.getElementById('llm-papers').textContent = papersData.filter(p => p.category === 'LLM Quantization').length;
            document.getElementById('edge-papers').textContent = papersData.filter(p => p.category === 'Edge Deployment').length;
            document.getElementById('uav-papers').textContent = papersData.filter(p => p.category === 'UAV Vision').length;
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderPapers(tab.dataset.filter);
            });
        });

        renderPapers();
